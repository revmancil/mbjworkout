<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b0b0d" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" href="./icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="./icon.svg" />
  <title>Creed Hybrid</title>
  <link rel="stylesheet" href="./css/app.css" />
</head>
<body>
  <div class="app-shell">

    <header class="topbar" id="topbar">
      <div class="topbar-inner">
        <div class="brand"><div class="mark">C</div>
          <div>
            <strong>Creed Hybrid</strong>
            <small id="topbarSub">Strength + functional training</small>
          </div>
        </div>
        <div class="topbar-stats">
          <div class="pill-stat"><span>Block</span><b id="topBlockWeek">W1</b></div>
          <div class="pill-stat"><span>Streak</span><b id="topStreak">0</b></div>
        </div>
      </div>
    </header>

    <button id="backBtn" class="back-btn" style="display:none">&larr; Back</button>

    <main class="screens">
      <section id="screen-home" class="screen active"><div id="homeContent" class="stack"></div></section>
      <section id="screen-schedule" class="screen"><div id="scheduleContent" class="stack"></div></section>
      <section id="screen-lifting" class="screen"><div id="liftingContent" class="stack"></div></section>
      <section id="screen-player" class="screen"><div id="playerContent" class="player-wrap"></div></section>
      <section id="screen-progress" class="screen"><div id="progressContent" class="stack"></div></section>
      <section id="screen-history" class="screen"><div id="historyContent" class="stack"></div></section>
      <section id="screen-block" class="screen"><div id="blockContent" class="stack"></div></section>
      <section id="screen-settings" class="screen"><div id="settingsContent" class="stack"></div></section>
    </main>

    <button id="timerFab" class="timer-fab">Rest timer</button>

    <nav class="bottom-nav" id="bottomNav">
      <div class="inner">
        <button class="tab active" data-screen="home"><span class="ic">&#9679;</span><small>Home</small></button>
        <button class="tab" data-screen="schedule"><span class="ic">&#9776;</span><small>Schedule</small></button>
        <button class="tab" data-screen="progress"><span class="ic">&#9650;</span><small>Progress</small></button>
        <button class="tab" data-screen="history"><span class="ic">&#8635;</span><small>History</small></button>
        <button class="tab" data-screen="settings"><span class="ic">&#9881;</span><small>Settings</small></button>
      </div>
    </nav>
  </div>

  <div id="timerModal" class="modal">
    <div class="timer-card">
      <div class="kicker" style="text-align:center">Rest clock</div>
      <div id="timerDisplay" class="timer-display">01:30</div>
      <div class="grid2" style="margin-bottom:12px">
        <button class="btn alt preset" data-sec="60">1:00</button>
        <button class="btn alt preset" data-sec="90">1:30</button>
        <button class="btn alt preset" data-sec="120">2:00</button>
        <button class="btn alt preset" data-sec="180">3:00</button>
      </div>
      <div class="grid2">
        <button id="timerStart" class="btn primary">Start</button>
        <button id="timerReset" class="btn alt">Reset</button>
      </div>
      <button id="timerClose" class="btn alt" style="width:100%;margin-top:10px">Close</button>
    </div>
  </div>

  <script src="./js/data.js"></script>
  <script src="./js/state.js"></script>
  <script src="./js/timeline.js"></script>
  <script src="./js/render.js"></script>
  <script src="./js/main.js"></script>
</body>
</html>
